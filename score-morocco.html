<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morocco Score — Overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        html { background: none !important; }
        body { background: none !important; overflow: hidden; }

        #score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 64px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div id="score">0</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    var SUPABASE_URL = 'https://skklkteabhgonpqqhhll.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2xrdGVhYmhnb25wcXFoaGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzI1MzksImV4cCI6MjA5Njk0ODUzOX0.pGH6p5a3K8WMdRlMxIMatfA8gbt0EB9f9c1xVbFA6OQ';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var el = document.getElementById('score');

    async function init() {
        // Single initial fetch
        var { data, error } = await sb
            .from('timer_state')
            .select('morocco_score')
            .eq('id', 1)
            .single();

        if (!error && data) {
            el.textContent = data.morocco_score ?? 0;
        }

        // Subscribe to realtime changes
        sb.channel('score-morocco')
          .on('postgres_changes',
              { event: 'UPDATE', schema: 'public', table: 'timer_state', filter: 'id=eq.1' },
              function(payload) {
                  var val = payload.new.morocco_score;
                  if (val === null || val === undefined) val = 0;
                  el.textContent = val;
              }
          )
          .subscribe();
    }

    init();
    </script>
</body>
</html>
