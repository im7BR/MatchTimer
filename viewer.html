<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Timer — Viewer</title>
    <meta name="description" content="Real-time football match timer viewer for OBS Browser Source.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: none !important;
            background-color: rgba(0,0,0,0) !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #display {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 20px;
        }

        /* ── Main timer numbers — NO shadow, pure clean white ── */
        #main-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            -webkit-text-stroke: 1px rgba(0, 0, 0, 0.4);
        }

        /* ── Stoppage time — clean yellow, no shadow ── */
        #stoppage-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #ffeb3b;
            margin-top: 5px;
            min-height: 30px;
            -webkit-text-stroke: 0.5px rgba(0, 0, 0, 0.3);
        }

        /* ── HT text — clean white, no shadow ── */
        #ht-text {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 8px;
            display: none;
            -webkit-text-stroke: 1px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div id="display">
        <span id="main-time">00:00</span>
        <span id="stoppage-time"></span>
        <span id="ht-text">HT</span>
    </div>

    <script>
    /* =========================================================
       Supabase — public anon key (safe for client-side)
       ========================================================= */
    const SUPABASE_URL = 'https://skklkteabhgonpqqhhll.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2xrdGVhYmhnb25wcXFoaGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzI1MzksImV4cCI6MjA5Njk0ODUzOX0.pGH6p5a3K8WMdRlMxIMatfA8gbt0EB9f9c1xVbFA6OQ';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ── DOM refs ── */
    const $main     = document.getElementById('main-time');
    const $stoppage = document.getElementById('stoppage-time');
    const $ht       = document.getElementById('ht-text');

    /* ── Local state ── */
    let currentState = null;
    let tickInterval = null;
    let pollInterval = null;

    /* =========================================================
       Helpers
       ========================================================= */
    function fmt(total) {
        const m = Math.floor(total / 60);
        const s = total % 60;
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    /** Compute "live" seconds from a state snapshot. */
    function liveSeconds(st) {
        if (st.is_running && st.last_started_at) {
            const elapsed = Math.floor((Date.now() - new Date(st.last_started_at).getTime()) / 1000);
            return st.seconds + Math.max(0, elapsed);
        }
        return st.seconds;
    }

    /* =========================================================
       Render
       ========================================================= */
    function render() {
        if (!currentState) return;

        /* ── Half-Time mode ── */
        if (currentState.display_mode === 'ht') {
            $main.style.display     = 'none';
            $stoppage.style.display = 'none';
            $ht.style.display       = 'inline';
            return;
        }

        /* ── Normal timer mode ── */
        $main.style.display     = 'inline';
        $stoppage.style.display = 'inline';
        $ht.style.display       = 'none';

        const cur  = liveSeconds(currentState);
        const half = currentState.current_half;

        if (half === 1 && cur >= 2700) {           // 45 min
            $main.textContent     = '45:00';
            $stoppage.textContent = '+ ' + fmt(cur - 2700);
        } else if (half === 2 && cur >= 5400) {    // 90 min
            $main.textContent     = '90:00';
            $stoppage.textContent = '+ ' + fmt(cur - 5400);
        } else {
            $main.textContent     = fmt(cur);
            $stoppage.textContent = '';
        }
    }

    function startTick() { stopTick(); tickInterval = setInterval(render, 250); }
    function stopTick()  { clearInterval(tickInterval); tickInterval = null; }

    /* =========================================================
       Apply incoming state
       ========================================================= */
    function applyState(st) {
        currentState = st;

        if (st.display_mode === 'ht' || !st.is_running) {
            stopTick();
            render();
        } else {
            startTick();
            render();
        }
    }

    /* =========================================================
       Fetch state from DB  (used by both init and polling)
       ========================================================= */
    async function fetchState() {
        try {
            const { data, error } = await sb
                .from('timer_state')
                .select('*')
                .eq('id', 1)
                .single();

            if (error) {
                console.error('[fetch]', error.message);
                return;
            }
            applyState(data);
        } catch (e) {
            console.error('[fetch exception]', e);
        }
    }

    /* =========================================================
       Realtime subscription  (instant updates when it works)
       ========================================================= */
    const channel = sb.channel('viewer-sync')
      .on('postgres_changes', {
          event:  'UPDATE',
          schema: 'public',
          table:  'timer_state'
      }, payload => {
          console.log('[realtime] got update');
          applyState(payload.new);
      })
      .subscribe((status) => {
          console.log('[realtime status]', status);
      });

    /* =========================================================
       Polling fallback — polls every 2 seconds so the viewer
       ALWAYS stays in sync, even if Realtime isn't enabled.
       ========================================================= */
    function startPolling() {
        stopPolling();
        pollInterval = setInterval(fetchState, 2000);
    }

    function stopPolling() {
        clearInterval(pollInterval);
        pollInterval = null;
    }

    /* =========================================================
       Init
       ========================================================= */
    async function init() {
        await fetchState();     // Get current state immediately
        startPolling();         // Start background polling as reliable fallback
    }

    init();
    </script>
</body>
</html>
