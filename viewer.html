<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Timer — Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <!-- NO external JS libraries — pure fetch() for maximum reliability -->
    <style>
        * { margin: 0; padding: 0; }
        html { background: none !important; }
        body { background: none !important; overflow: hidden; }

        #display {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 10px 20px;
        }

        #main-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
        }

        #stoppage-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #ffeb3b;
            margin-top: 5px;
            min-height: 30px;
        }

        #ht-text {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="display">
        <span id="main-time">00:00</span>
        <span id="stoppage-time"></span>
        <span id="ht-text">HT</span>
    </div>

    <script>
    /*  ── Pure REST polling — no libraries, no WebSockets ──
        Hits the Supabase REST API every 1 second with raw fetch().
        This CANNOT fail unless the internet is down.              */

    const API = 'https://skklkteabhgonpqqhhll.supabase.co/rest/v1/timer_state?id=eq.1&select=*';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2xrdGVhYmhnb25wcXFoaGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzI1MzksImV4cCI6MjA5Njk0ODUzOX0.pGH6p5a3K8WMdRlMxIMatfA8gbt0EB9f9c1xVbFA6OQ';
    const HEADERS = {
        'apikey': KEY,
        'Authorization': 'Bearer ' + KEY
    };

    const $main     = document.getElementById('main-time');
    const $stoppage = document.getElementById('stoppage-time');
    const $ht       = document.getElementById('ht-text');

    let state = null;
    let tickId = null;

    function fmt(t) {
        const m = Math.floor(t / 60);
        const s = t % 60;
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    function liveSeconds() {
        if (!state) return 0;
        if (state.is_running && state.last_started_at) {
            const elapsed = Math.floor((Date.now() - new Date(state.last_started_at).getTime()) / 1000);
            return state.seconds + Math.max(0, elapsed);
        }
        return state.seconds;
    }

    function render() {
        if (!state) return;

        if (state.display_mode === 'ht') {
            $main.style.display     = 'none';
            $stoppage.style.display = 'none';
            $ht.style.display       = 'inline';
            return;
        }

        $main.style.display     = 'inline';
        $stoppage.style.display = 'inline';
        $ht.style.display       = 'none';

        const cur  = liveSeconds();
        const half = state.current_half;

        if (half === 1 && cur >= 2700) {
            $main.textContent     = '45:00';
            $stoppage.textContent = '+ ' + fmt(cur - 2700);
        } else if (half === 2 && cur >= 5400) {
            $main.textContent     = '90:00';
            $stoppage.textContent = '+ ' + fmt(cur - 5400);
        } else {
            $main.textContent     = fmt(cur);
            $stoppage.textContent = '';
        }
    }

    /* ── Fetch state from Supabase REST API ── */
    async function poll() {
        try {
            const res = await fetch(API, { headers: HEADERS });
            const arr = await res.json();
            if (arr && arr.length > 0) {
                const newState = arr[0];

                /* Detect state change — restart/stop local tick accordingly */
                const wasRunning = state ? state.is_running : false;
                const nowRunning = newState.is_running;

                state = newState;

                if (nowRunning && !tickId) {
                    tickId = setInterval(render, 250);
                } else if (!nowRunning && tickId) {
                    clearInterval(tickId);
                    tickId = null;
                }

                render();
            }
        } catch (e) {
            /* Network error — just skip this cycle */
        }
    }

    /* ── Start polling immediately, repeat every 1 second ── */
    poll();
    setInterval(poll, 1000);
    </script>
</body>
</html>
