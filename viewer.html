<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Timer — Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        html { background: none !important; }
        body { background: none !important; overflow: hidden; }

        #display {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 10px 20px;
        }

        #main-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
        }

        #stoppage-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #ffeb3b;
            margin-top: 5px;
            min-height: 30px;
        }

        #ht-text {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="display">
        <span id="main-time">00:00</span>
        <span id="stoppage-time"></span>
        <span id="ht-text">HT</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    /*  ── Viewer v7 — Supabase Realtime (no polling) ──
        Uses a single WebSocket connection instead of 1-req/sec polling.
        Still counts locally using Date.now() for smooth OBS rendering. */

    var SUPABASE_URL = 'https://skklkteabhgonpqqhhll.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2xrdGVhYmhnb25wcXFoaGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzI1MzksImV4cCI6MjA5Njk0ODUzOX0.pGH6p5a3K8WMdRlMxIMatfA8gbt0EB9f9c1xVbFA6OQ';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var $main     = document.getElementById('main-time');
    var $stoppage = document.getElementById('stoppage-time');
    var $ht       = document.getElementById('ht-text');

    var state          = null;
    var localStartTime = null;
    var localBase      = 0;
    var wasRunning     = false;
    var lastSec        = -1;

    function fmt(t) {
        var m = Math.floor(t / 60);
        var s = t % 60;
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    function liveSeconds() {
        if (!state) return 0;

        if (state.is_running) {
            if (localStartTime === null) {
                localStartTime = Date.now();
                localBase = state.seconds;

                if (state.last_started_at) {
                    var serverStart = new Date(state.last_started_at).getTime();
                    if (!isNaN(serverStart)) {
                        var serverElapsed = Math.floor((Date.now() - serverStart) / 1000);
                        if (serverElapsed >= 0 && serverElapsed < 86400) {
                            localBase = state.seconds + serverElapsed;
                        }
                    }
                }
            }

            var localElapsed = Math.floor((Date.now() - localStartTime) / 1000);
            return localBase + localElapsed;
        }

        localStartTime = null;
        localBase = 0;
        return state.seconds;
    }

    function render() {
        if (!state) return;

        if (state.display_mode === 'ht') {
            $main.style.display     = 'none';
            $stoppage.style.display = 'none';
            $ht.style.display       = 'inline';
            lastSec = -1;
            return;
        }

        $main.style.display     = 'inline';
        $stoppage.style.display = 'inline';
        $ht.style.display       = 'none';

        var cur  = liveSeconds();
        var half = state.current_half;

        if (cur === lastSec) return;
        lastSec = cur;

        if (half === 1 && cur >= 2700) {
            $main.textContent     = '45:00';
            $stoppage.textContent = '+ ' + fmt(cur - 2700);
        } else if (half === 2 && cur >= 5400) {
            $main.textContent     = '90:00';
            $stoppage.textContent = '+ ' + fmt(cur - 5400);
        } else {
            $main.textContent     = fmt(cur);
            $stoppage.textContent = '';
        }
    }

    /* ── Apply new state from DB ── */
    function applyState(newState) {
        var nowRunning = newState.is_running;
        if (nowRunning && !wasRunning) {
            localStartTime = null;
        }
        state = newState;
        wasRunning = nowRunning;
        lastSec = -1;
    }

    /* ── Continuous render loop (requestAnimationFrame = OBS-safe) ── */
    function tick() {
        render();
        requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    /* ── Init: one fetch + Realtime subscription ── */
    async function init() {
        // Single initial fetch
        var { data, error } = await sb
            .from('timer_state')
            .select('*')
            .eq('id', 1)
            .single();

        if (!error && data) {
            applyState(data);
        }

        // Subscribe to realtime changes — no more polling
        sb.channel('viewer-timer')
          .on('postgres_changes',
              { event: 'UPDATE', schema: 'public', table: 'timer_state', filter: 'id=eq.1' },
              function(payload) {
                  applyState(payload.new);
              }
          )
          .subscribe();
    }

    init();
    </script>
</body>
</html>
