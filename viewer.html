<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Timer — Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        html { background: none !important; }
        body { background: none !important; overflow: hidden; }

        #display {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            padding: 10px 20px;
        }

        #main-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
        }

        #stoppage-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: #ffeb3b;
            margin-top: 5px;
            min-height: 30px;
        }

        #ht-text {
            font-family: 'Inter', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="display">
        <span id="main-time">00:00</span>
        <span id="stoppage-time"></span>
        <span id="ht-text">HT</span>
    </div>

    <script>
    /*  Pure REST polling — no libraries, no WebSockets.
        Uses requestAnimationFrame for smooth counting (OBS-safe). */

    var API = 'https://skklkteabhgonpqqhhll.supabase.co/rest/v1/timer_state?id=eq.1&select=*';
    var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2xrdGVhYmhnb25wcXFoaGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzI1MzksImV4cCI6MjA5Njk0ODUzOX0.pGH6p5a3K8WMdRlMxIMatfA8gbt0EB9f9c1xVbFA6OQ';

    var $main     = document.getElementById('main-time');
    var $stoppage = document.getElementById('stoppage-time');
    var $ht       = document.getElementById('ht-text');

    var state     = null;
    var lastSec   = -1;  // track last displayed second to avoid unnecessary DOM writes

    function fmt(t) {
        var m = Math.floor(t / 60);
        var s = t % 60;
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    function liveSeconds() {
        if (!state) return 0;
        if (state.is_running && state.last_started_at) {
            var started = new Date(state.last_started_at).getTime();
            if (isNaN(started)) return state.seconds;   // safety: bad date
            var elapsed = Math.floor((Date.now() - started) / 1000);
            return state.seconds + Math.max(0, elapsed);
        }
        return state.seconds;
    }

    function render() {
        if (!state) return;

        /* HT mode */
        if (state.display_mode === 'ht') {
            $main.style.display     = 'none';
            $stoppage.style.display = 'none';
            $ht.style.display       = 'inline';
            lastSec = -1;
            return;
        }

        $main.style.display     = 'inline';
        $stoppage.style.display = 'inline';
        $ht.style.display       = 'none';

        var cur  = liveSeconds();
        var half = state.current_half;

        /* Only touch the DOM when the second actually changes */
        if (cur === lastSec) return;
        lastSec = cur;

        if (half === 1 && cur >= 2700) {
            $main.textContent     = '45:00';
            $stoppage.textContent = '+ ' + fmt(cur - 2700);
        } else if (half === 2 && cur >= 5400) {
            $main.textContent     = '90:00';
            $stoppage.textContent = '+ ' + fmt(cur - 5400);
        } else {
            $main.textContent     = fmt(cur);
            $stoppage.textContent = '';
        }
    }

    /* ── Animation loop — runs continuously, OBS-safe ── */
    function tick() {
        render();
        requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    /* ── Poll Supabase every 1 second ── */
    function poll() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API, true);
        xhr.setRequestHeader('apikey', KEY);
        xhr.setRequestHeader('Authorization', 'Bearer ' + KEY);
        xhr.setRequestHeader('Cache-Control', 'no-cache, no-store');
        xhr.setRequestHeader('Pragma', 'no-cache');
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    var arr = JSON.parse(xhr.responseText);
                    if (arr && arr.length > 0) {
                        state = arr[0];
                        lastSec = -1;   // force re-render on new data
                    }
                } catch(e) {}
            }
        };
        xhr.send();
    }

    /* Start polling immediately, then every 1 second */
    poll();
    setInterval(poll, 1000);
    </script>
</body>
</html>
