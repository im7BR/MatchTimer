<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Football Timer — Controller</title>
    <meta name="description" content="Real-time football match timer controller with cloud sync via Supabase.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #e0e0ff;
            background: #07060e;
            overflow-x: hidden;
        }

        /* ── Animated background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(88, 60, 200, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(30, 100, 220, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(140, 80, 255, 0.06) 0%, transparent 70%);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0%   { opacity: 0.9; transform: scale(1); }
            100% { opacity: 1;   transform: scale(1.05); }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 28px 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 20%, #b0b8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .conn-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .conn-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #888;
            transition: background 0.4s;
        }

        .conn-dot.ok   { background: #4caf50; box-shadow: 0 0 6px #4caf50; animation: pulse 2s infinite; }
        .conn-dot.err  { background: #f44336; box-shadow: 0 0 6px #f44336; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.35; }
        }

        /* ── Glass card ── */
        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 22px;
            padding: 28px;
        }

        /* ── Timer Display Card ── */
        .timer-card { text-align: center; padding: 36px 28px 28px; }

        .timer-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 92px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 50px rgba(120, 140, 255, 0.25);
            line-height: 1;
            transition: text-shadow 0.4s;
        }

        .timer-value.running {
            text-shadow: 0 0 60px rgba(100, 220, 130, 0.35);
        }

        .timer-value.ht-mode {
            font-family: 'Inter', sans-serif;
            letter-spacing: 10px;
            text-shadow: 0 0 50px rgba(255, 200, 50, 0.35);
        }

        .stoppage-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 34px;
            font-weight: 700;
            color: #ffe066;
            margin-top: 6px;
            min-height: 42px;
            text-shadow: 0 0 12px rgba(255, 224, 102, 0.25);
        }

        /* ── State Badges ── */
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 22px;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .b-half {
            background: rgba(100, 140, 255, 0.14);
            color: #8ab4ff;
            border-color: rgba(100, 140, 255, 0.25);
        }

        .b-running {
            background: rgba(76, 175, 80, 0.14);
            color: #81c784;
            border-color: rgba(76, 175, 80, 0.25);
        }

        .b-paused {
            background: rgba(255, 152, 0, 0.14);
            color: #ffb74d;
            border-color: rgba(255, 152, 0, 0.25);
        }

        .b-ht {
            background: rgba(255, 235, 59, 0.14);
            color: #fff176;
            border-color: rgba(255, 235, 59, 0.25);
        }

        /* ── Buttons ── */
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 22px 12px;
            border: none;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.25s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.35);
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
            border-radius: inherit;
        }

        .btn:hover::after { background: rgba(255,255,255,0.10); }
        .btn:active  { transform: scale(0.96); }
        .btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

        .btn-start  { background: linear-gradient(135deg, #1b5e20 0%, #388e3c 100%); box-shadow: 0 4px 20px rgba(56, 142, 60, 0.25); }
        .btn-pause  { background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 100%); box-shadow: 0 4px 20px rgba(211, 47, 47, 0.25); }
        .btn-half   { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 100%); box-shadow: 0 4px 20px rgba(25, 118, 210, 0.18); }
        .btn-ht     { background: linear-gradient(135deg, #e65100 0%, #f57c00 100%); box-shadow: 0 4px 20px rgba(245, 124, 0, 0.25); }
        .btn-set    { background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 100%); box-shadow: 0 4px 20px rgba(123, 31, 162, 0.20); flex: 0 0 auto; padding: 22px 36px; }

        /* ── Manual Input Row ── */
        .manual-row { align-items: center; }

        .manual-label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .manual-input {
            flex: 1;
            padding: 16px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .manual-input::placeholder { color: rgba(255,255,255,0.22); }
        .manual-input:focus {
            border-color: rgba(120, 140, 255, 0.45);
            box-shadow: 0 0 0 3px rgba(120, 140, 255, 0.10);
        }

        /* ── Footer link ── */
        .footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.30);
            line-height: 1.6;
        }

        .footer a {
            color: #8ab4ff;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .wrapper { padding: 18px 12px 32px; gap: 16px; }
            .timer-value   { font-size: 60px; }
            .stoppage-value { font-size: 24px; min-height: 30px; }
            .btn { padding: 18px 8px; font-size: 15px; }
            .manual-input { font-size: 20px; padding: 14px 10px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">

        <!-- Header -->
        <header class="header">
            <h1>⚽ Football Timer</h1>
            <div class="conn-badge">
                <span class="conn-dot" id="conn-dot"></span>
                <span id="conn-text">Connecting…</span>
            </div>
        </header>

        <!-- Timer Display -->
        <section class="card timer-card" aria-label="Timer display">
            <div class="timer-value" id="timer-value">00:00</div>
            <div class="stoppage-value" id="stoppage-value"></div>
            <div class="badges">
                <span class="badge b-half" id="badge-half">1ST HALF</span>
                <span class="badge b-paused" id="badge-state">PAUSED</span>
            </div>
        </section>

        <!-- Controls -->
        <section class="card" aria-label="Timer controls">
            <div class="btn-grid">
                <div class="btn-row">
                    <button class="btn btn-start" id="btn-start" onclick="handleStart()">▶&ensp;Start</button>
                    <button class="btn btn-pause" id="btn-pause" onclick="handlePause()">⏸&ensp;Pause</button>
                </div>
                <div class="btn-row">
                    <button class="btn btn-half" id="btn-1st" onclick="handleReset(0, 1)">1st Half</button>
                    <button class="btn btn-ht"   id="btn-ht"  onclick="handleHT()">⏱&ensp;HT</button>
                    <button class="btn btn-half" id="btn-2nd" onclick="handleReset(45, 2)">2nd Half</button>
                </div>
                <div class="btn-row manual-row">
                    <span class="manual-label">Set Time</span>
                    <input type="text" class="manual-input" id="manual-time" placeholder="MM:SS" value="00:00" aria-label="Manual time input">
                    <button class="btn btn-set" id="btn-set" onclick="handleSetTime()">Set</button>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            Viewer URL for OBS:&ensp;<a href="viewer.html" target="_blank" rel="noopener">viewer.html</a><br>
            Share the full hosted link with your friend as a Browser Source.
        </footer>

    </div>

    <script>
    /* =========================================================
       Supabase — use only the anon/public key (safe for client)
       ========================================================= */
    const SUPABASE_URL  = 'https://skklkteabhgonpqqhhll.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNra2xrdGVhYmhnb25wcXFoaGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzI1MzksImV4cCI6MjA5Njk0ODUzOX0.pGH6p5a3K8WMdRlMxIMatfA8gbt0EB9f9c1xVbFA6OQ';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ── Local state ── */
    let seconds       = 0;
    let isRunning      = false;
    let currentHalf    = 1;
    let displayMode    = 'timer';   // 'timer' | 'ht'
    let lastStartedAt  = null;      // ISO-8601 string when running
    let tickInterval   = null;

    /* ── DOM refs ── */
    const $timer     = document.getElementById('timer-value');
    const $stoppage  = document.getElementById('stoppage-value');
    const $badgeHalf = document.getElementById('badge-half');
    const $badgeSt   = document.getElementById('badge-state');
    const $connDot   = document.getElementById('conn-dot');
    const $connText  = document.getElementById('conn-text');

    /* =========================================================
       Helpers
       ========================================================= */
    function fmt(total) {
        const m = Math.floor(total / 60);
        const s = total % 60;
        return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
    }

    /** Return the "live" seconds value, accounting for elapsed time while running. */
    function liveSeconds() {
        if (isRunning && lastStartedAt) {
            const elapsed = Math.floor((Date.now() - new Date(lastStartedAt).getTime()) / 1000);
            return seconds + Math.max(0, elapsed);
        }
        return seconds;
    }

    /* =========================================================
       Render
       ========================================================= */
    function render() {
        const cur = liveSeconds();

        /* ── Half-Time mode ── */
        if (displayMode === 'ht') {
            $timer.textContent = 'HT';
            $timer.classList.add('ht-mode');
            $timer.classList.remove('running');
            $stoppage.textContent = '';
            $badgeSt.textContent  = 'HALF TIME';
            $badgeSt.className    = 'badge b-ht';
            return;
        }

        $timer.classList.remove('ht-mode');
        $timer.classList.toggle('running', isRunning);

        /* ── Stoppage-time logic ── */
        if (currentHalf === 1 && cur >= 2700) {          // 45 × 60
            $timer.textContent    = '45:00';
            $stoppage.textContent = '+ ' + fmt(cur - 2700);
        } else if (currentHalf === 2 && cur >= 5400) {   // 90 × 60
            $timer.textContent    = '90:00';
            $stoppage.textContent = '+ ' + fmt(cur - 5400);
        } else {
            $timer.textContent    = fmt(cur);
            $stoppage.textContent = '';
        }

        /* ── Badges ── */
        $badgeHalf.textContent = currentHalf === 1 ? '1ST HALF' : '2ND HALF';
        if (isRunning) {
            $badgeSt.textContent = 'RUNNING';
            $badgeSt.className   = 'badge b-running';
        } else {
            $badgeSt.textContent = 'PAUSED';
            $badgeSt.className   = 'badge b-paused';
        }
    }

    function startTick()  { stopTick(); tickInterval = setInterval(render, 250); }
    function stopTick()   { clearInterval(tickInterval); tickInterval = null; }

    /* =========================================================
       Push state → Supabase  (called ONLY on user actions)
       ========================================================= */
    async function pushState() {
        const { error } = await sb.from('timer_state').update({
            seconds,
            is_running:      isRunning,
            current_half:    currentHalf,
            display_mode:    displayMode,
            last_started_at: lastStartedAt,
            updated_at:      new Date().toISOString()
        }).eq('id', 1);

        if (error) console.error('[push]', error.message);
    }

    /* =========================================================
       User-action handlers
       ========================================================= */
    async function handleStart() {
        if (isRunning) return;
        if (displayMode === 'ht') displayMode = 'timer';
        isRunning      = true;
        lastStartedAt  = new Date().toISOString();
        startTick();
        render();
        await pushState();
    }

    async function handlePause() {
        if (!isRunning) return;
        seconds        = liveSeconds();
        isRunning      = false;
        lastStartedAt  = null;
        stopTick();
        render();
        await pushState();
    }

    async function handleHT() {
        seconds        = liveSeconds();
        isRunning      = false;
        lastStartedAt  = null;
        displayMode    = 'ht';
        stopTick();
        render();
        await pushState();
    }

    async function handleReset(startMin, half) {
        seconds       = startMin * 60;
        isRunning     = false;
        currentHalf   = half;
        displayMode   = 'timer';
        lastStartedAt = null;
        stopTick();
        render();
        await pushState();
    }

    async function handleSetTime() {
        const raw   = document.getElementById('manual-time').value.trim();
        const parts = raw.split(':');
        if (parts.length !== 2) return alert('Format as MM:SS with a colon.');
        const m = parseInt(parts[0], 10);
        const s = parseInt(parts[1], 10);
        if (isNaN(m) || isNaN(s)) return alert('Use numbers, e.g. 15:30');

        seconds       = m * 60 + s;
        isRunning     = false;
        currentHalf   = m < 45 ? 1 : 2;
        displayMode   = 'timer';
        lastStartedAt = null;
        stopTick();
        render();
        await pushState();
    }

    /* =========================================================
       Init — fetch current state from DB
       ========================================================= */
    async function init() {
        const { data, error } = await sb
            .from('timer_state')
            .select('*')
            .eq('id', 1)
            .single();

        if (error) {
            console.error('[init]', error.message);
            $connDot.className  = 'conn-dot err';
            $connText.textContent = 'DB Error';
            return;
        }

        seconds       = data.seconds        ?? 0;
        isRunning     = data.is_running      ?? false;
        currentHalf   = data.current_half    ?? 1;
        displayMode   = data.display_mode    ?? 'timer';
        lastStartedAt = data.last_started_at ?? null;

        if (isRunning) startTick();
        render();

        $connDot.className    = 'conn-dot ok';
        $connText.textContent = 'Connected';
    }

    init();
    </script>
</body>
</html>
